<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>구스링 – 구로 스마트 링</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #1a4fa8;
      --blue2:  #2563eb;
      --light:  #eff6ff;
      --border: #e5e7eb;
      --text:   #1a1a2e;
      --gray:   #6b7280;
      --green:  #10b981;
      --radius: 14px;
    }

    body { font-family: 'Segoe UI', 'Noto Sans KR', sans-serif; background: #f5f7fa; color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: white; padding: 16px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .logo-ring {
      width: 46px; height: 46px; border-radius: 50%;
      background: white; display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.4);
    }
    .header h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
    .header p  { font-size: 12px; opacity: 0.82; margin-top: 2px; }

    /* ── Steps ── */
    .steps {
      display: flex; background: white;
      border-bottom: 1px solid var(--border);
      padding: 0 16px; overflow-x: auto; gap: 4px;
    }
    .step {
      display: flex; align-items: center; gap: 6px;
      padding: 12px 10px; font-size: 12px; color: #9ca3af; white-space: nowrap; cursor: default;
    }
    .step.active { color: var(--blue2); font-weight: 700; }
    .step.done   { color: var(--green); }
    .step-num {
      width: 22px; height: 22px; border-radius: 50%;
      background: #e5e7eb; color: #6b7280;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .step.active .step-num { background: var(--blue2); color: white; }
    .step.done   .step-num { background: var(--green); color: white; }
    .sep { color: #d1d5db; display: flex; align-items: center; font-size: 14px; }

    /* ── Main ── */
    .main { padding: 20px 16px; max-width: 700px; margin: 0 auto; }
    .section-title { font-size: 14px; font-weight: 700; color: #374151; margin-bottom: 14px; }

    /* ── Language Grid ── */
    .lang-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 10px;
      margin-bottom: 28px;
    }
    .lang-card {
      background: white; border: 2px solid var(--border); border-radius: var(--radius);
      padding: 18px 12px; cursor: pointer; transition: all 0.16s; text-align: center;
    }
    .lang-card:hover  { border-color: #93c5fd; transform: translateY(-2px); }
    .lang-card.active { border-color: var(--blue2); background: var(--light); }
    .lang-flag {
      width: 48px; height: 32px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; letter-spacing: 0.5px;
      margin: 0 auto 8px; color: white;
    }
    .flag-kr { background: linear-gradient(135deg, #cd2e3a, #003478); }
    .flag-zh { background: linear-gradient(135deg, #de2910, #ffde00); color: #de2910; background: #de2910; }
    .flag-vi { background: linear-gradient(135deg, #da251d, #da251d); }
    .flag-ja { background: linear-gradient(135deg, #bc002d, #fff); color: #bc002d; background: #fff; border: 1.5px solid #e5e7eb; }
    .flag-fil { background: linear-gradient(135deg, #0038a8, #ce1127); }
    .lang-native { font-size: 14px; font-weight: 700; color: #1e3a8a; }
    .lang-sub    { font-size: 11px; color: var(--gray); margin-top: 2px; }

    /* ── Category Tabs ── */
    .cat-tabs { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .cat-tab {
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--border); background: white;
      font-size: 12px; cursor: pointer; transition: all 0.14s;
    }
    .cat-tab.active { background: #1e3a8a; color: white; border-color: #1e3a8a; }

    /* ── Form List ── */
    .form-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .form-card {
      background: white; border: 2px solid var(--border); border-radius: var(--radius);
      padding: 16px; cursor: pointer; transition: all 0.16s;
      display: flex; align-items: center; gap: 14px;
    }
    .form-card:hover { border-color: #93c5fd; transform: translateX(3px); }
    .form-icon {
      width: 42px; height: 42px; border-radius: 11px;
      background: #dbeafe; display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .form-card-body  { flex: 1; }
    .form-card-title { font-size: 14px; font-weight: 700; color: #1e3a8a; }
    .form-card-desc  { font-size: 11px; color: var(--gray); margin-top: 3px; line-height: 1.5; }
    .form-card-arr   { color: #9ca3af; font-size: 18px; }

    /* ── Detail ── */
    .back-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: none; color: var(--gray);
      font-size: 13px; cursor: pointer; margin-bottom: 16px; padding: 0;
    }
    .back-btn:hover { color: #1e3a8a; }

    .detail-card { background: white; border-radius: 20px; overflow: hidden; margin-bottom: 16px; }

    /* title bar */
    .detail-head {
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: white; padding: 20px 20px 16px;
    }
    .detail-head .ko-label { font-size: 11px; opacity: 0.75; }
    .detail-head .native-title { font-size: 20px; font-weight: 800; margin: 4px 0 10px; }
    .where-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.2); border-radius: 8px;
      padding: 5px 10px; font-size: 11px;
    }
    .tts-row {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px; border-bottom: 1px solid var(--border);
    }
    .tts-btn {
      display: flex; align-items: center; gap: 6px;
      background: #f0fdf4; border: 1.5px solid #86efac; color: #15803d;
      border-radius: 9px; padding: 7px 12px; font-size: 12px;
      cursor: pointer; font-weight: 600; transition: all 0.14s;
    }
    .tts-btn:hover { background: #dcfce7; }
    .desc-text { font-size: 12px; color: #78350f; background: #fefce8; border: 1px solid #fde68a; border-radius: 9px; padding: 10px 12px; flex: 1; line-height: 1.6; }

    /* ── Form Image + Fields ── */
    .form-image-wrap {
      position: relative; padding: 16px; border-bottom: 1px solid var(--border);
    }
    .form-img {
      width: 100%; border-radius: 10px; border: 1px solid var(--border);
      display: block; cursor: zoom-in;
    }
    .img-caption {
      text-align: center; font-size: 11px; color: var(--gray); margin-top: 8px;
    }
    .lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); z-index: 999;
      align-items: center; justify-content: center; padding: 12px;
      cursor: zoom-out;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 100%; max-height: 100%; border-radius: 8px; object-fit: contain; }

    /* field guide */
    .field-guide { padding: 16px 20px; }
    .guide-title { font-size: 13px; font-weight: 700; color: #374151; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .field-row {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 10px 0; border-bottom: 1px solid #f3f4f6;
    }
    .field-row:last-child { border-bottom: none; }
    .field-num {
      width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
      background: var(--blue2); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; margin-top: 1px;
    }
    .field-body { flex: 1; }
    .field-native { font-size: 13px; font-weight: 700; color: #1e3a8a; }
    .field-ko     { font-size: 11px; color: var(--gray); margin-top: 1px; }
    .field-note   { font-size: 11px; color: #78350f; background: #fefce8; border-radius: 6px; padding: 3px 7px; margin-top: 4px; display: inline-block; }
    .field-ex     { font-size: 11px; color: #374151; margin-top: 3px; }
    .field-ex code { background: #f3f4f6; border-radius: 4px; padding: 1px 5px; font-family: monospace; }
    .req-dot { width: 6px; height: 6px; border-radius: 50%; background: #ef4444; display: inline-block; margin-left: 4px; vertical-align: middle; }

    /* options */
    .options-wrap { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
    .opt-chip {
      padding: 4px 10px; border-radius: 20px; font-size: 11px;
      border: 1px solid var(--border); background: #f9fafb; color: #374151;
    }
    .opt-sub { font-size: 10px; color: #9ca3af; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo-ring">💍</div>
  <div>
    <h1 id="h-title">구스링</h1>
    <p id="h-sub">Guro Smart Ring · 구로구 다국어 민원서식 가이드</p>
  </div>
</div>

<!-- Steps -->
<div class="steps">
  <div class="step active" id="s1"><div class="step-num">1</div><span id="s1-lbl">언어 선택</span></div>
  <div class="sep">›</div>
  <div class="step" id="s2"><div class="step-num">2</div><span id="s2-lbl">서식 선택</span></div>
  <div class="sep">›</div>
  <div class="step" id="s3"><div class="step-num">3</div><span id="s3-lbl">서식 안내</span></div>
</div>

<div class="main">

  <!-- ── Screen 1: Language ── -->
  <div id="sc-lang">
    <p class="section-title" id="lang-prompt">언어를 선택하세요</p>
    <div class="lang-grid">
      <div class="lang-card" onclick="pickLang('ko')"><div class="lang-flag flag-kr">한국</div><div class="lang-native">한국어</div><div class="lang-sub">Korean</div></div>
      <div class="lang-card" onclick="pickLang('zh')"><div class="lang-flag flag-zh">中文</div><div class="lang-native">中文</div><div class="lang-sub">중국어</div></div>
      <div class="lang-card" onclick="pickLang('vi')"><div class="lang-flag flag-vi">VN</div><div class="lang-native">Tiếng Việt</div><div class="lang-sub">베트남어</div></div>
      <div class="lang-card" onclick="pickLang('ja')"><div class="lang-flag flag-ja">日本</div><div class="lang-native">日本語</div><div class="lang-sub">일본어</div></div>
      <div class="lang-card" onclick="pickLang('fil')"><div class="lang-flag flag-fil">PH</div><div class="lang-native">Filipino</div><div class="lang-sub">필리핀어</div></div>
    </div>
  </div>

  <!-- ── Screen 2: Form List ── -->
  <div id="sc-forms" class="hidden">
    <button class="back-btn" onclick="go(1)">← <span id="back1-lbl">언어 다시 선택</span></button>
    <p class="section-title" id="form-prompt">서식을 선택하세요</p>
    <div class="cat-tabs">
      <div class="cat-tab active" onclick="filterCat('all',this)"><span id="cat-all">전체</span></div>
      <div class="cat-tab" onclick="filterCat('주민등록',this)"><span id="cat-r">주민등록</span></div>
      <div class="cat-tab" onclick="filterCat('가족관계',this)"><span id="cat-f">가족관계</span></div>
    </div>
    <div class="form-list" id="form-list"></div>
  </div>

  <!-- ── Screen 3: Detail ── -->
  <div id="sc-detail" class="hidden">
    <button class="back-btn" onclick="go(2)">← <span id="back2-lbl">서식 목록으로</span></button>
    <div class="detail-card">
      <div class="detail-head">
        <div class="ko-label" id="d-ko"></div>
        <div class="native-title" id="d-native"></div>
        <div class="where-badge">📍 <span id="d-where"></span></div>
      </div>
      <div class="tts-row">
        <button class="tts-btn" onclick="speak()">🔊 <span id="tts-lbl">설명 듣기</span></button>
        <div class="desc-text" id="d-desc"></div>
      </div>
      <div class="form-image-wrap">
        <img id="form-img" class="form-img" src="" alt="" onclick="openLightbox()" />
        <div class="img-caption" id="img-cap">이미지를 탭하면 크게 볼 수 있어요</div>
      </div>
      <div class="field-guide">
        <div class="guide-title">📋 <span id="guide-title-lbl">항목별 안내</span></div>
        <div id="field-list"></div>
      </div>
    </div>
  </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lb-img" src="" alt="서식 원본" />
</div>

/* ── State ── */
let lang = 'ko';
let curCat = 'all';
let curForm = null;

/* ── Render helpers ── */
function applyUI(l) {
  const u = UI[l];
  $('h-title').textContent  = u.hTitle;
  $('h-sub').textContent    = u.hSub;
  $('s1-lbl').textContent   = u.s1;
  $('s2-lbl').textContent   = u.s2;
  $('s3-lbl').textContent   = u.s3;
  $('lang-prompt').textContent  = u.langPrompt;
  $('form-prompt').textContent  = u.formPrompt;
  $('tts-lbl').textContent  = u.tts;
  $('back1-lbl').textContent= u.back1;
  $('back2-lbl').textContent= u.back2;
  $('cat-all').textContent  = u.catAll;
  $('cat-r').textContent    = u.catR;
  $('cat-f').textContent    = u.catF;
  $('guide-title-lbl').textContent = u.guideTitle;
  $('img-cap').textContent  = u.imgCap;
}

function $(id){ return document.getElementById(id); }

/* ── Step 1 ── */
function pickLang(l) {
  lang = l;
  applyUI(l);
  renderForms(curCat);
  go(2);
}

/* ── Step 2 ── */
function filterCat(cat, el) {
  curCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderForms(cat);
}

function renderForms(cat) {
  const list = $('form-list');
  list.innerHTML = '';
  const items = cat === 'all' ? FORMS : FORMS.filter(f => f.cat === cat);
  items.forEach(form => {
    const el = document.createElement('div');
    el.className = 'form-card';
    el.innerHTML = `
      <div class="form-icon">${form.icon}</div>
      <div class="form-card-body">
        <div class="form-card-title">${form.title[lang]}</div>
        <div class="form-card-desc">${form.desc[lang]}</div>
      </div>
      <div class="form-card-arr">›</div>`;
    el.onclick = () => showDetail(form);
    list.appendChild(el);
  });
}

/* ── Step 3 ── */
function showDetail(form) {
  curForm = form;
  const u = UI[lang];

  $('d-ko').textContent      = form.title.ko;
  $('d-native').textContent  = form.title[lang];
  $('d-where').textContent   = form.where[lang];
  $('d-desc').textContent    = form.desc[lang];

  // Image
  $('form-img').src = form.img;
  $('form-img').alt = form.title.ko;
  $('lb-img').src   = form.img;

  // Fields
  const fl = $('field-list');
  fl.innerHTML = '';
  form.fields.forEach((f, i) => {
    const row = document.createElement('div');
    row.className = 'field-row';

    let extraHtml = '';
    if (f.note) {
      extraHtml += `<span class="field-note">💡 ${f.note[lang]}</span>`;
    }
    if (f.ex) {
      extraHtml += `<div class="field-ex">예시 <code>${f.ex}</code></div>`;
    }
    if (f.options) {
      const chips = f.options.map(o => `<span class="opt-chip">${o[lang]}<br><span class="opt-sub">${lang!=='ko'?o.ko:''}</span></span>`).join('');
      extraHtml += `<div class="options-wrap">${chips}</div>`;
    }

    row.innerHTML = `
      <div class="field-num">${i+1}</div>
      <div class="field-body">
        <div class="field-native">${f.label[lang]}${f.req?'<span class="req-dot"></span>':''}</div>
        ${lang!=='ko'?`<div class="field-ko">${f.label.ko}</div>`:''}
        ${extraHtml}
      </div>`;
    fl.appendChild(row);
  });

  go(3);
}

/* ── TTS ── */
function speak() {
  if (!curForm) return;
  const text = curForm.desc[lang];
  const map  = { ko:'ko-KR', zh:'zh-CN', vi:'vi-VN', ja:'ja-JP', fil:'fil-PH' };
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = map[lang] || 'ko-KR';
  u.rate = 0.88;
  speechSynthesis.speak(u);
}

/* ── Lightbox ── */
function openLightbox()  { $('lightbox').classList.add('open'); }
function closeLightbox() { $('lightbox').classList.remove('open'); }

/* ── Navigation ── */
function go(screen) {
  $('sc-lang').classList.toggle('hidden',   screen !== 1);
  $('sc-forms').classList.toggle('hidden',  screen !== 2);
  $('sc-detail').classList.toggle('hidden', screen !== 3);

  ['s1','s2','s3'].forEach((id, i) => {
    const el = $(id);
    el.className = 'step' + (i+1 < screen ? ' done' : i+1 === screen ? ' active' : '');
  });

  window.scrollTo({ top: 0, behavior: 'smooth' });
}
